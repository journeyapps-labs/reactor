packages:
  - ./libs/*
  - ./modules/*
  - ./demo/*
overrides:
  '@journeyapps-labs/common-tree': ^3.0.0
  '@ungap/structured-clone': ^1.3.1
  encoding-sniffer: ^1.0.2
allowBuilds:
  core-js-pure: true
  esbuild: true
shamefullyHoist: true
minimumReleaseAgeExclude:
  - '@types/node@26.1.0'
  - js-yaml@5.2.1
  - prettier@3.9.5
  - '@projectstorm/*'