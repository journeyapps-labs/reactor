packages:
  - ./libs/*
  - ./modules/*
  - ./demo/*
overrides:
  # Keep all workspace packages on the Reactor-compatible common-tree major.
  '@journeyapps-labs/common-tree': ^3.0.0
  # mdast/rehype still pull 1.3.0, which is deprecated for CWE-502 risk.
  '@ungap/structured-clone': ^1.3.1
  # cheerio pulls encoding-sniffer 0.2.x, which still depends on deprecated whatwg-encoding.
  encoding-sniffer: ^1.0.2
allowBuilds:
  core-js-pure: true
  esbuild: true
shamefullyHoist: true
minimumReleaseAgeExclude:
  - '@types/node@26.1.0'
  - js-yaml@5.2.1
